<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>사원증 생성기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #eef0f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    /* 카카오 인앱 브라우저 경고 배너 */
    #kakaoBanner {
      display: none;
      width: 100%;
      background: #FEE500;
      padding: 14px 16px;
      text-align: center;
    }
    #kakaoBanner p {
      font-size: 13px;
      color: #333;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    #kakaoBanner .banner-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    #kakaoBanner button {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-chrome { background: #1a73e8; color: white; }
    .btn-copy   { background: #333; color: white; }

    h1 {
      font-size: 20px;
      color: #1a3a6e;
      margin: 24px 0 20px;
      letter-spacing: -0.5px;
    }
    .layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 440px;
      padding: 0 16px;
    }
    .panel {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 22px 20px;
    }
    .panel h2 {
      font-size: 11px;
      color: #999;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 18px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
      -webkit-appearance: none;
    }
    .field input[type="text"]:focus { border-color: #1a3a6e; }

    .upload-area {
      border: 2px dashed #c8d0e0;
      border-radius: 12px;
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      background: #f8f9fc;
      transition: all 0.2s;
      position: relative;
    }
    .upload-area.has-file {
      border-color: #1a3a6e;
      background: #f0f4ff;
      border-style: solid;
    }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .upload-area .upload-icon { font-size: 30px; margin-bottom: 6px; }
    .upload-area p { font-size: 13px; color: #aaa; }
    .upload-area .filename {
      color: #1a3a6e; font-weight: 700;
      margin-top: 5px; font-size: 13px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      background: #f8f9fc;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #1a3a6e;
      cursor: pointer; flex-shrink: 0;
    }
    .checkbox-row span { font-size: 14px; color: #333; font-weight: 600; }
    .checkbox-row .badge {
      margin-left: auto;
      font-size: 10px; color: #888;
      background: #e0e4f0;
      padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
    }

    .btn-generate {
      width: 100%;
      padding: 15px;
      background: #1a3a6e;
      color: white; border: none;
      border-radius: 12px;
      font-size: 16px; font-family: inherit; font-weight: 700;
      cursor: pointer; margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-generate:active { background: #0f2756; }

    .preview-panel { align-items: center; }
    .preview-panel h2 { align-self: flex-start; }
    #cardCanvas {
      display: block;
      border: 1px solid #e0e0e0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border-radius: 4px;
      max-width: 100%;
    }
    .btn-row {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%;
    }
    .btn-save {
      padding: 14px 10px;
      background: #37474f; color: white; border: none;
      border-radius: 12px; font-size: 14px;
      font-family: inherit; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:active { background: #263238; }
    .btn-pdf {
      padding: 14px 10px;
      background: #c62828; color: white; border: none;
      border-radius: 12px; font-size: 14px;
      font-family: inherit; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-pdf:active { background: #b71c1c; }
    .btn-pdf.loading { background: #999; pointer-events: none; }

    .hint {
      font-size: 11px; color: #bbb;
      margin-top: 10px; text-align: center; line-height: 1.6;
    }
    .hint b { color: #888; }
  </style>
</head>
<body>

  <!-- 카카오 인앱 브라우저 감지 배너 -->
  <div id="kakaoBanner">
    <p>📌 카카오톡 내부 브라우저에서는<br>사진 업로드가 제한될 수 있습니다.<br>아래 버튼으로 외부 브라우저에서 열어주세요.</p>
    <div class="banner-btns">
      <button class="btn-chrome" onclick="openInChrome()">Chrome으로 열기</button>
      <button class="btn-copy"   onclick="copyUrl()">링크 복사</button>
    </div>
  </div>

  <h1>사원증 생성기</h1>
  <div class="layout">

    <div class="panel">
      <h2>정보 입력</h2>
      <div class="field">
        <label>한글 이름</label>
        <input type="text" id="nameKo" placeholder="홍길동" oninput="generateCard()">
      </div>
      <div class="field">
        <label>영문 이름</label>
        <input type="text" id="nameEn" placeholder="HONG GIL DONG"
               oninput="generateCard()" autocapitalize="characters">
      </div>
      <div class="field">
        <label>증명사진</label>
        <div class="upload-area" id="uploadArea">
          <!-- capture 속성 제거: 갤러리·카메라 모두 선택 가능 -->
          <input type="file" id="photoInput" accept="image/*"
                 onchange="onPhotoSelected(this)">
          <div class="upload-icon">📷</div>
          <p>탭하여 사진 선택</p>
          <div class="filename" id="fileName"></div>
        </div>
      </div>
      <div class="field">
        <label>옵션</label>
        <label class="checkbox-row" for="grayscaleCheck">
          <input type="checkbox" id="grayscaleCheck" onchange="generateCard()">
          <span>그레이스케일 (흑백)</span>
          <span class="badge">흑백</span>
        </label>
      </div>
      <button class="btn-generate" onclick="animatePhotoIn()">사원증 생성</button>
    </div>

    <div class="panel preview-panel">
      <h2>미리보기</h2>
      <canvas id="cardCanvas"></canvas>
      <div class="btn-row">
        <button class="btn-save" onclick="downloadPng()">🖼 PNG 저장</button>
        <button class="btn-pdf" id="btnPdf" onclick="downloadPdf()">📄 인쇄저장</button>
      </div>
      <p class="hint"><b>인쇄저장</b>: PDF 저장 → 100% 배율 인쇄 시 <b>5.4 × 8.5 cm</b></p>
    </div>

  </div>

  <script>
    // ── 카카오 인앱 브라우저 감지 ───────────────────────────────────
    (function() {
      const ua = navigator.userAgent || '';
      const isKakao = /KAKAOTALK|KAKAO/i.test(ua);
      if (isKakao) {
        document.getElementById('kakaoBanner').style.display = 'block';
      }
    })();

    function openInChrome() {
      const url = location.href;
      // Android: intent URL로 Chrome 강제 실행
      if (/Android/i.test(navigator.userAgent)) {
        location.href = 'intent://' + url.replace(/^https?:\/\//, '')
          + '#Intent;scheme=' + (url.startsWith('https') ? 'https' : 'http')
          + ';package=com.android.chrome;end';
      } else {
        // iOS: 직접 방법 없음 → 링크 복사 후 Safari에서 열도록 안내
        copyUrl();
        alert('링크가 복사되었습니다.\nSafari를 열고 주소창에 붙여넣기 해주세요.');
      }
    }

    function copyUrl() {
      const url = location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        alert('링크가 복사되었습니다!');
      }
    }
    // ─────────────────────────────────────────────────────────────

      dst.set(src.slice(0,33),0);dst.set(chunk,33);dst.set(src.slice(33),54);
      let b=''; const S=8192;
      for(let i=0;i<dst.length;i+=S)
        b+=String.fromCharCode(...dst.subarray(i,Math.min(i+S,dst.length)));
      return 'data:image/png;base64,'+btoa(b);
    }
    // ─────────────────────────────────────────────────────────────

    function easeOutQuart(t) { return 1 - Math.pow(1-t, 4); }

    function animatePhotoIn() {
      if (!uploadedPhoto) { generateCard(); return; }
      if (rafId) cancelAnimationFrame(rafId);
      photoProgress = 0;
      const t0 = performance.now();
      function frame(now) {
        const t = Math.min((now - t0) / 1000, 1);
        photoProgress = easeOutQuart(t);
        generateCard();
        if (t < 1) { rafId = requestAnimationFrame(frame); }
        else { photoProgress = 1; generateCard(); rafId = null; }
      }
      rafId = requestAnimationFrame(frame);
    }

    (function() {
      const img = new Image();
      img.onload = () => { logoImg = img; generateCard(); };
      img.src = LOGO_DATA;
    })();

    function onPhotoSelected(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('uploadArea').classList.add('has-file');
      const reader = new FileReader();
      reader.onerror = () => alert('사진을 읽을 수 없습니다.\n외부 브라우저(Chrome/Safari)에서 열어 다시 시도해주세요.');
      reader.onload = e => {
        const img = new Image();
        img.onerror = () => alert('이미지 로드 실패. 다른 사진으로 시도해주세요.');
        img.onload = () => { uploadedPhoto = img; animatePhotoIn(); };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function toGrayscaleCanvas(img, sw, sh) {
      const off = document.createElement('canvas');
      off.width = sw; off.height = sh;
      const o = off.getContext('2d');
      o.filter = 'grayscale(100%)';
      o.drawImage(img, 0, 0, sw, sh);
      return off;
    }

    function drawPhoto(ctx, W, H) {
      if (!uploadedPhoto || photoProgress <= 0) return;
      const FROM = CM(2.0), photoW = W, photoH = H - FROM;
      const srcW = uploadedPhoto.naturalWidth, srcH = uploadedPhoto.naturalHeight;
      const sR = srcW/srcH, dR = photoW/photoH;
      let sx, sy, sw, sh;
      if (sR > dR) { sh=srcH; sw=sh*dR; sx=(srcW-sw)/2; sy=0; }
      else         { sw=srcW; sh=sw/dR; sx=0; sy=0; }
      const isGray = document.getElementById('grayscaleCheck').checked;
      const slide = CM(2.5) * (1 - photoProgress);
      ctx.globalAlpha = Math.min(photoProgress * 1.4, 1);
      ctx.drawImage(isGray ? toGrayscaleCanvas(uploadedPhoto,srcW,srcH) : uploadedPhoto,
                    sx, sy, sw, sh, 0, FROM + slide, photoW, photoH);
      ctx.globalAlpha = 1;
      const SE=CM(2.6), FE=CM(4.8);
      const g = ctx.createLinearGradient(0, SE, 0, FE);
      g.addColorStop(0,    'rgba(255,255,255,1)');
      g.addColorStop(0.28, 'rgba(255,255,255,0.88)');
      g.addColorStop(0.52, 'rgba(255,255,255,0.55)');
      g.addColorStop(0.74, 'rgba(255,255,255,0.18)');
      g.addColorStop(1,    'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, FE);
    }

    function generateCard() {
      const canvas = document.getElementById('cardCanvas');
      const W = Math.round(CM(CARD_W)), H = Math.round(CM(CARD_H));
      canvas.width = W; canvas.height = H;
      const maxW = Math.min(window.innerWidth - 64, 400);
      const dispW = Math.min(maxW, Math.round(H * CARD_W / CARD_H * 0.7));
      canvas.style.width  = dispW + 'px';
      canvas.style.height = Math.round(dispW * CARD_H / CARD_W) + 'px';

      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
      drawPhoto(ctx, W, H);

      const ko = document.getElementById('nameKo').value.trim();
      if (ko) {
        ctx.font=`${Math.round(CM(0.45))}px "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif`;
        ctx.fillStyle='#111'; ctx.textBaseline='top';
        ctx.fillText(ko, CM(0.6), CM(1.2));
      }
      const en = document.getElementById('nameEn').value.trim();
      if (en) {
        ctx.font=`${Math.round(CM(0.3))}px "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif`;
        ctx.fillStyle='#333'; ctx.textBaseline='top';
        ctx.fillText(en, CM(0.6), CM(1.8));
      }
      if (logoImg) {
        const lw=CM(0.9), lh=lw*logoImg.naturalHeight/logoImg.naturalWidth;
        ctx.drawImage(logoImg, CM(4.1), CM(1), lw, lh);
      }
      ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=2;
      ctx.strokeRect(1, 1, W-2, H-2);
    }

    function getFinishedDataUrl() {
      if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
      photoProgress = 1; generateCard();
      return document.getElementById('cardCanvas').toDataURL('image/png');
    }

    function downloadPng() {
      const a = document.createElement('a');
      a.download = '사원증_300dpi.png';
      a.href = injectPngDpi(getFinishedDataUrl(), PRINT_DPI);
      a.click();
    }

    async function downloadPdf() {
      const btn = document.getElementById('btnPdf');
      btn.classList.add('loading');
      btn.innerHTML = '⏳ 생성 중...';
      try {
        let attempts = 0;
        while (!window.jspdf && attempts++ < 50)
          await new Promise(r => setTimeout(r, 100));
        if (!window.jspdf) throw new Error('jsPDF 로드 실패 (인터넷 연결 확인)');
        const { jsPDF } = window.jspdf;
        const dataUrl = getFinishedDataUrl();
        const pdf = new jsPDF({ orientation:'portrait', unit:'cm', format:[5.4,8.5] });
        pdf.addImage(dataUrl, 'PNG', 0, 0, 5.4, 8.5, '', 'FAST');
        const ko = document.getElementById('nameKo').value.trim() || '사원증';
        pdf.save(ko + '_사원증.pdf');
      } catch(e) {
        alert('PDF 생성 실패: ' + e.message);
      } finally {
        btn.classList.remove('loading');
        btn.innerHTML = '📄 인쇄저장';
      }
    }

    window.addEventListener('resize', () => generateCard());
  </script>
</body>
</html>
